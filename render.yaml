databases:
  - name: blast-postgres
    plan: free

services:
  - type: web
    name: blast-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blast-postgres
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://silasmukabwa254-ux.github.io,http://localhost:3000
      - key: BLAST_AI_MODEL
        value: gpt-5.4-mini
